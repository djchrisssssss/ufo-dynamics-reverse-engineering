name: Validate Repository

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Run repository validation
        run: python scripts/validate_repository.py --check-urls --enforce-url-status

  latex:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: latex
          root_file: main.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ufo-dynamics-paper
          path: latex/main.pdf
          retention-days: 30
